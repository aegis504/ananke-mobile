name: Android Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Setup Android SDK Location
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Fix Missing Dependencies
        run: |
          sed -i '/dependencies {/a \    implementation "com.google.firebase:firebase-appindexing:20.0.0"' android/app/build.gradle
          
      - name: Resolve Dependency Conflicts
        run: |
          echo "allprojects { configurations.all { resolutionStrategy { force 'com.google.android.gms:play-services-ads:23.1.0'; force 'com.google.android.gms:play-services-ads-lite:23.1.0' } } }" >> android/build.gradle

      - name: Build Android App (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
